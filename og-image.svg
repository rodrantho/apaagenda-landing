<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="#1e293b" opacity="0.6"/>
  <!-- Logo icon -->
  <rect x="160" y="160" width="90" height="90" rx="20" fill="url(#accent)"/>
  <text x="205" y="225" font-size="52" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" fill="white">A</text>
  <!-- Brand name -->
  <text x="270" y="200" font-size="52" font-family="system-ui,sans-serif" font-weight="900" fill="white">Apa! <tspan fill="#6366f1">Agenda</tspan></text>
  <text x="270" y="245" font-size="26" font-family="system-ui,sans-serif" fill="#94a3b8">Tu agenda online, lista en minutos</text>
  <!-- Divider -->
  <rect x="160" y="295" width="880" height="2" fill="#334155"/>
  <!-- Features row -->
  <text x="160" y="360" font-size="22" font-family="system-ui,sans-serif" fill="#cbd5e1">✅  Reservas online</text>
  <text x="160" y="400" font-size="22" font-family="system-ui,sans-serif" fill="#cbd5e1">📧  Confirmaciones por email</text>
  <text x="160" y="440" font-size="22" font-family="system-ui,sans-serif" fill="#cbd5e1">💳  Pagos con Mercado Pago</text>
  <text x="560" y="360" font-size="22" font-family="system-ui,sans-serif" fill="#cbd5e1">🔗  Link de reservas propio</text>
  <text x="560" y="400" font-size="22" font-family="system-ui,sans-serif" fill="#cbd5e1">✈️  Notificaciones por Telegram</text>
  <text x="560" y="440" font-size="22" font-family="system-ui,sans-serif" fill="#cbd5e1">🧩  Widget embeddable</text>
  <!-- CTA -->
  <rect x="160" y="485" width="340" height="50" rx="12" fill="url(#accent)"/>
  <text x="330" y="518" font-size="22" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" fill="white">Probá 7 días gratis →</text>
  <!-- Domain -->
  <text x="1040" y="520" font-size="20" text-anchor="end" font-family="system-ui,sans-serif" fill="#475569">apagenda.com</text>
</svg>
